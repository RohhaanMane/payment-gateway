spring:
  application:
    name: payment-gateway
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/paymentGatewayDB}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:8963}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
